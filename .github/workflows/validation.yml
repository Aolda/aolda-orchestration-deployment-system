name: Validation

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend validation
        run: make check-backend

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend validation
        run: make check-frontend

  manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.24.0

      - name: Create kind cluster
        run: kind create cluster --wait 120s

      - name: Install kubeconform
        run: |
          go install github.com/yannh/kubeconform/cmd/kubeconform@v0.4.13
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run manifest validation
        env:
          AODS_MANIFEST_REQUIRE_SERVER: "1"
          AODS_MANIFEST_SERVER_DRY_RUN: "1"
        run: make check-manifests

  images:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: image-tags
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend=ghcr.io/${owner}/aods-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${owner}/aods-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: docker build -t "${{ steps.image-tags.outputs.backend }}" ./backend

      - name: Build frontend image
        run: docker build -t "${{ steps.image-tags.outputs.frontend }}" ./frontend

      - name: Log in to GHCR
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Push images to GHCR
        if: github.event_name == 'push'
        run: |
          docker push "${{ steps.image-tags.outputs.backend }}"
          docker push "${{ steps.image-tags.outputs.frontend }}"
