            cpuRequestCores: 0.5
            cpuLimitCores: 1
            cpuUsageCores: 0.31
            cpuRequestUtilization: 62
            cpuLimitUtilization: 31
            memoryRequestMiB: 512
            memoryLimitMiB: 1024
            memoryUsageMiB: 320
            memoryRequestUtilization: 62.5
            memoryLimitUtilization: 31.25

    RollbackPolicy:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        maxErrorRate:
          type: number
        maxLatencyP95Ms:
          type: integer
        minRequestRate:
          type: number
      example:
        enabled: true
        maxErrorRate: 3.5
        maxLatencyP95Ms: 700
        minRequestRate: 5

    ApplicationEvent:
      type: object
      required:
        - id
        - type
        - message
        - createdAt
      properties:
        id:
          type: string
        type:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    EventListResponse:
      type: object
      required:
        - applicationId
        - items
      properties:
        applicationId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationEvent'
      example:
        applicationId: shared__payment-api
        items:
          - id: evt_01HABC
            type: AutoRollbackTriggered
            message: 자동 롤백을 수행했습니다. Error rate exceeded threshold.
            createdAt: '2026-04-12T10:30:00Z'
            metadata:
              sourceDeploymentId: dep_01HXYZ
              rollbackToImageTag: v1.2.3

    CreateChangeRequest:
      type: object
      required:
        - operation
      properties:
        operation:
          type: string
          enum:
            - CreateApplication
            - UpdateApplication
            - Redeploy
            - UpdatePolicies
        applicationId:
          type: string
        name:
          type: string
        description:
          type: string
        image:
          type: string
        servicePort:
          type: integer
        deploymentStrategy:
          type: string
          enum:
            - Rollout
            - Canary
        environment:
          type: string
        imageTag:
          type: string
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretEntry'
        repositoryUrl:
          type: string
          format: uri
        repositoryBranch:
          type: string
        repositoryToken:
          type: string
        repositoryServiceId:
          type: string
        configPath:
          type: string
        registryServer:
          type: string
        registryUsername:
          type: string
        registryToken:
          type: string
        policies:
          $ref: '#/components/schemas/ProjectPolicy'
        summary:
          type: string
      example:
        operation: Redeploy
        applicationId: shared__payment-api
        environment: prod
        imageTag: v1.2.4
        summary: 프로덕션 이미지 태그를 v1.2.4로 올립니다.

    ChangeRecord:
      type: object
      required:
        - id
        - projectId
        - operation
        - environment
        - writeMode
        - status
        - summary
        - diffPreview
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        projectId:
          type: string
        applicationId:
          type: string
        operation:
          type: string
          enum:
            - CreateApplication
            - UpdateApplication
            - Redeploy
            - UpdatePolicies
        environment:
          type: string
        writeMode:
          type: string
          enum:
            - direct
            - pull_request
        status:
          type: string
          enum:
            - Draft
            - Submitted
            - Approved
            - Merged
        summary:
          type: string
        diffPreview:
          type: array
          items:
            type: string
        createdBy:
          type: string
        approvedBy:
          type: string
        mergedBy:
          type: string
        request:
          $ref: '#/components/schemas/CreateChangeRequest'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: chg_01HXYZ
        projectId: shared
        applicationId: shared__payment-api
        operation: Redeploy
        environment: prod
        writeMode: pull_request
        status: Submitted
        summary: 프로덕션 이미지 태그를 v1.2.4로 올립니다.
        diffPreview:
          - '~ image: ghcr.io/aolda/payment-api:v1.2.3 -> ghcr.io/aolda/payment-api:v1.2.4'
        createdBy: local.developer
        createdAt: '2026-04-12T10:20:00Z'
        updatedAt: '2026-04-12T10:21:00Z'

    ErrorBody:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        requestId:
          type: string
        retryable:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
      example:
        error:
          code: PROJECT_NOT_FOUND
          message: Project was not found.
          details:
            projectId: project-x
          requestId: req_1744444444444_000001
          retryable: false

  responses:
    BadRequest:
      description: Invalid request payload or unsupported input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated, but not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Referenced project, application, deployment, or backing resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource state conflict, duplicate application, or operation already in progress
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server or integration failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

