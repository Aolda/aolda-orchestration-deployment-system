          - staging
          - prod
        allowedDeploymentStrategies:
          - Rollout
          - Canary
        allowedClusterTargets:
          - default
        prodPRRequired: false
        autoRollbackEnabled: true
        requiredProbes: true

    ClusterSummary:
      type: object
      required:
        - id
        - name
        - default
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        default:
          type: boolean

    CreateClusterRequest:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Stable cluster identifier used in GitOps paths.
        name:
          type: string
          description: Display name shown in the platform.
        description:
          type: string
        default:
          type: boolean
          description: When true, marks this cluster as the default target in the cluster catalog.
      example:
        id: edge
        name: Edge Cluster
        description: Dedicated edge workloads.
        default: false

    ClusterListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClusterSummary'
      example:
        items:
          - id: default
            name: Default Cluster
            description: 기본 클러스터 타겟
            default: true

    CapacitySummary:
      type: object
      properties:
        allocatableCpuCores:
          type: number
        allocatableMemoryMiB:
          type: number
        requestedCpuCores:
          type: number
        requestedMemoryMiB:
          type: number
        usedCpuCores:
          type: number
        usedMemoryMiB:
          type: number
        availableCpuCores:
          type: number
        availableMemoryMiB:
          type: number
        requestCpuUtilization:
          type: number
        requestMemoryUtilization:
          type: number
        usageCpuUtilization:
          type: number
        usageMemoryUtilization:
          type: number

    ServiceEfficiencyStatus:
      type: string
      enum:
        - Balanced
        - Underutilized
        - Overutilized
        - NoMetrics
        - Unknown

    EfficiencyCounts:
      type: object
      required:
        - balanced
        - underutilized
        - overutilized
        - noMetrics
        - unknown
      properties:
        balanced:
          type: integer
        underutilized:
          type: integer
        overutilized:
          type: integer
        noMetrics:
          type: integer
        unknown:
          type: integer

    ServiceResourceEfficiency:
      type: object
      required:
        - applicationId
        - projectId
        - projectName
        - namespace
        - name
        - podCount
        - readyPodCount
        - status
        - summary
      properties:
        applicationId:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        clusterId:
          type: string
        clusterName:
          type: string
        namespace:
          type: string
        name:
          type: string
        podCount:
          type: integer
        readyPodCount:
          type: integer
        status:
          $ref: '#/components/schemas/ServiceEfficiencyStatus'
        summary:
          type: string
        cpuRequestCores:
          type: number
        cpuLimitCores:
          type: number
        cpuUsageCores:
          type: number
        cpuRequestUtilization:
          type: number
        cpuLimitUtilization:
          type: number
        memoryRequestMiB:
          type: number
        memoryLimitMiB:
          type: number
        memoryUsageMiB:
          type: number
        memoryRequestUtilization:
          type: number
        memoryLimitUtilization:
          type: number

    FleetResourceOverviewResponse:
      type: object
      required:
        - generatedAt
        - runtimeConnected
        - projectCount
        - serviceCount
        - capacity
        - counts
        - services
      properties:
        generatedAt:
          type: string
          format: date-time
        runtimeConnected:
          type: boolean
        message:
          type: string
        projectCount:
          type: integer
        serviceCount:
          type: integer
        capacity:
          $ref: '#/components/schemas/CapacitySummary'
        counts:
          $ref: '#/components/schemas/EfficiencyCounts'
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceResourceEfficiency'
      example:
        generatedAt: '2026-04-18T02:00:00Z'
        runtimeConnected: true
        message: ''
        projectCount: 4
        serviceCount: 12
        capacity:
          allocatableCpuCores: 32
          requestedCpuCores: 14.5
          usedCpuCores: 8.2
          availableCpuCores: 17.5
          allocatableMemoryMiB: 65536
          requestedMemoryMiB: 24576
