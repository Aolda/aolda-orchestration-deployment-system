          availableMemoryMiB: 40960
          requestCpuUtilization: 45.3
          requestMemoryUtilization: 37.5
          usageCpuUtilization: 25.6
          usageMemoryUtilization: 22.7
        counts:
          balanced: 6
          underutilized: 3
          overutilized: 1
          noMetrics: 1
          unknown: 1
        services:
          - applicationId: shared__portal
            projectId: shared
            projectName: 공용 프로젝트
            clusterId: default
            clusterName: Shared Cluster
            namespace: shared
            name: portal
            podCount: 2
            readyPodCount: 2
            status: Balanced
