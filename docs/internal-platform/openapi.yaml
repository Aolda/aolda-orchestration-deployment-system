openapi: 3.0.3
info:
  title: Internal App Deployment Platform API
  version: 0.8.0
  description: >
    Phase 1 through Phase 4 API specification for the internal app deployment
    platform. This contract covers GitHub-backed catalog discovery, standard and
    canary deployment workflows, change management, environment and policy
    controls, GitOps sync visibility, Vault-backed secret submission, and
    platform-scale guardrails.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
    description: Authentication and current-user lookup
  - name: Projects
    description: Project catalog, environments, repositories, and policy APIs
  - name: Clusters
    description: Cluster catalog APIs
  - name: Applications
    description: Application CRUD-style operations, sync status, metrics, rollback policy, and events
  - name: Deployments
    description: Deployment history and rollout control APIs
  - name: Changes
    description: Review-gated change request lifecycle APIs
paths:
  /api/v1/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current authenticated user
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects available to the current user
      responses:
        '200':
          description: Project list filtered by authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Bootstrap a project catalog entry with default access and policy scaffolding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project bootstrap completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/clusters:
    get:
      tags: [Clusters]
      operationId: listClusters
      summary: List cluster targets available to the platform
      responses:
        '200':
          description: Cluster list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/resource-overview:
    get:
      tags: [Admin]
      operationId: getFleetResourceOverview
      summary: Get platform-wide resource capacity and efficiency overview
      responses:
        '200':
          description: Fleet resource overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FleetResourceOverviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Clusters]
      operationId: createCluster
      summary: Bootstrap a cluster target and its Flux scaffold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClusterRequest'
      responses:
        '201':
          description: Cluster bootstrap completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}:
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: Delete a project catalog entry and its managed application resources
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLifecycleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/environments:
    get:
      tags: [Projects]
      operationId: listProjectEnvironments
      summary: List environments configured for a project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project environment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/repositories:
    get:
      tags: [Projects]
      operationId: listProjectRepositories
      summary: List source repositories connected to a project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project repository list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/policies:
    get:
      tags: [Projects]
      operationId: getProjectPolicies
      summary: Read project deployment guardrails
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Projects]
      operationId: updateProjectPolicies
      summary: Update project deployment guardrails
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPolicy'
      responses:
        '200':
          description: Updated project policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/changes:
    post:
      tags: [Changes]
      operationId: createProjectChange
      summary: Create a reviewed change request for a project mutation
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChangeRequest'
      responses:
        '201':
          description: Change created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/applications:
    get:
      tags: [Applications]
      operationId: listProjectApplications
      summary: List applications in a project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project application list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Applications]
      operationId: createApplication
      summary: Create a new application
      description: Applications can be created with Rollout or Canary strategies.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/health:
    get:
      tags: [Applications]
      operationId: getProjectHealth
      summary: Get project-level application health snapshots
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectHealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/applications/source-preview:
    post:
      tags: [Applications]
      operationId: previewApplicationSource
      summary: Read and preview a GitHub-backed application descriptor before creation
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewApplicationSourceRequest'
      responses:
        '200':
          description: Descriptor preview loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewApplicationSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/applications/image-access:
    post:
      tags: [Applications]
      operationId: verifyImageAccess
      summary: Verify whether an image can be pulled with the supplied registry credentials
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyImageAccessRequest'
      responses:
        '200':
          description: Image access verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyImageAccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments:
    get:
      tags: [Deployments]
      operationId: listDeployments
      summary: List deployment history for an application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Deployment history list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Deployments]
      operationId: createDeployment
      summary: Trigger a new deployment revision
      description: Supports standard redeploys and canary revisions.
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}:
    delete:
      tags: [Applications]
      operationId: deleteApplication
      summary: Permanently delete an application and its final secret
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationLifecycleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Applications]
      operationId: patchApplication
      summary: Update application strategy or environment defaults
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
      responses:
        '200':
          description: Application updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/secrets:
    get:
      tags: [Applications]
      operationId: getApplicationSecrets
      summary: List Vault-backed application environment variable keys
      description: Returns key names and Vault path metadata only. Secret values are never returned.
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application secret key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSecretsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Applications]
      operationId: updateApplicationSecrets
      summary: Update Vault-backed application environment variables
      description: Applies a set/delete patch to the final Vault KV v2 path. The response returns key names only.
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSecretsRequest'
      responses:
        '200':
          description: Application secrets updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSecretsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/secrets/versions:
    get:
      tags: [Applications]
      operationId: listApplicationSecretVersions
      summary: List Vault KV v2 versions for application environment variables
      description: Returns Vault KV v2 version metadata only. Secret values are never returned.
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application secret version history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSecretVersionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/secrets/versions/{version}/restore:
    post:
      tags: [Applications]
      operationId: restoreApplicationSecretVersion
      summary: Restore application environment variables from a Vault KV v2 version
      description: Reads the selected Vault KV v2 version and writes it as a new final version. Secret values are never returned.
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/SecretVersion'
      responses:
        '200':
          description: Application secret version restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSecretsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/archive:
    post:
      tags: [Applications]
      operationId: archiveApplication
      summary: Archive an application while retaining history metadata
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationLifecycleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments/{deploymentId}:
    get:
      tags: [Deployments]
      operationId: getDeployment
      summary: Get deployment revision detail including rollout state
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Deployment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments/{deploymentId}/promote:
    post:
      tags: [Deployments]
      operationId: promoteDeployment
      summary: Promote a canary rollout to the next step
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Deployment promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments/{deploymentId}/abort:
    post:
      tags: [Deployments]
      operationId: abortDeployment
      summary: Abort an in-flight canary rollout
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Deployment aborted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/sync-status:
    get:
      tags: [Applications]
      operationId: getApplicationSyncStatus
      summary: Check Flux GitOps sync status via Kubernetes API
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/sync:
    post:
      tags: [Applications]
      operationId: syncApplicationRepositoryNow
      summary: Trigger an immediate repository sync check for a repository-backed application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Repository sync completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositorySyncResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/network-exposure:
    get:
      tags: [Applications]
      operationId: getApplicationNetworkExposure
      summary: Check Kubernetes Service / LoadBalancer exposure status for the application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Network exposure status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkExposureResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/metrics:
    get:
      tags: [Applications]
      operationId: getApplicationMetrics
      summary: Get core Prometheus metrics for the application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - name: range
          in: query
          required: false
          description: Duration window for the metric query, e.g. `15m`, `1h`, `24h`.
          schema:
            type: string
          example: 15m
        - name: step
          in: query
          required: false
          description: Sampling interval for the metric query, e.g. `1m`, `5m`.
          schema:
            type: string
          example: 1m
      responses:
        '200':
          description: Metric snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/metrics/diagnostics:
    get:
      tags: [Applications]
      operationId: getApplicationMetricsDiagnostics
      summary: Explain whether application metrics are being collected
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - name: range
          in: query
          required: false
          description: Duration window for diagnostic metric checks.
          schema:
            type: string
          example: 15m
        - name: step
          in: query
          required: false
          description: Sampling interval for diagnostic metric checks.
          schema:
            type: string
          example: 1m
      responses:
        '200':
          description: Metrics collection diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsDiagnosticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/logs:
    get:
      tags: [Applications]
      operationId: getApplicationLogs
      summary: Get recent Kubernetes container logs for the application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - name: tailLines
          in: query
          required: false
          description: Number of recent log lines to return per container stream.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        '200':
          description: Recent container logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerLogsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/logs/targets:
    get:
      tags: [Applications]
      operationId: getApplicationLogTargets
      summary: List selectable pod and container log targets for the application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Available pod and container targets with current resource status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerLogTargetsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/logs/stream:
    get:
      tags: [Applications]
      operationId: streamApplicationLogs
      summary: Stream Kubernetes pod logs for a selected pod and container
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - name: podName
          in: query
          required: true
          description: Kubernetes pod name to stream logs from.
          schema:
            type: string
        - name: containerName
          in: query
          required: true
          description: Container name inside the selected pod.
          schema:
            type: string
        - name: tailLines
          in: query
          required: false
          description: Number of recent log lines to replay before continuing the live stream.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        '200':
          description: Server-sent event stream of container logs
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: log
                data: {"podName":"payment-api-7d9f8d7-abcde","containerName":"payment-api","timestamp":"2026-04-17T02:10:00.000000000Z","message":"server started","rawLine":"2026-04-17T02:10:00.000000000Z server started"}

                event: log
                data: {"podName":"payment-api-7d9f8d7-abcde","containerName":"payment-api","timestamp":"2026-04-17T02:10:05.000000000Z","message":"listening on :8080","rawLine":"2026-04-17T02:10:05.000000000Z listening on :8080"}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/rollback-policies:
    get:
      tags: [Applications]
      operationId: getRollbackPolicy
      summary: Get rollback policy thresholds for an application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Current rollback policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Applications]
      operationId: saveRollbackPolicy
      summary: Save rollback policy thresholds for an application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackPolicy'
      responses:
        '200':
          description: Rollback policy saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/events:
    get:
      tags: [Applications]
      operationId: listApplicationEvents
      summary: List application deployment and policy events
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}:
    get:
      tags: [Changes]
      operationId: getChange
      summary: Get change request detail
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}/submit:
    post:
      tags: [Changes]
      operationId: submitChange
      summary: Submit a draft change for review
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}/approve:
    post:
      tags: [Changes]
      operationId: approveChange
      summary: Approve a submitted change
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}/merge:
    post:
      tags: [Changes]
      operationId: mergeChange
      summary: Merge an approved change into the desired state
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change merged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: Project identifier from the GitHub-backed project catalog.
      schema:
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
    ApplicationId:
      name: applicationId
      in: path
      required: true
      description: Deterministic application ID derived from GitHub path, e.g. shared__my-app.
      schema:
        type: string
    SecretVersion:
      name: version
      in: path
      required: true
      description: Positive Vault KV v2 version number.
      schema:
        type: integer
        minimum: 1
    DeploymentId:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
    ChangeId:
      name: changeId
      in: path
      required: true
      schema:
        type: string

  schemas:
    CurrentUser:
      type: object
      required:
        - id
        - username
        - groups
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        groups:
          type: array
          items:
            type: string
      example:
        id: user_123
        username: local.developer
        displayName: 로컬 운영자
        groups:
          - aods:shared:deploy

    ProjectRole:
      type: string
      enum:
        - viewer
        - deployer
        - admin

    ProjectSummary:
      type: object
      required:
        - id
        - name
        - namespace
        - role
      properties:
        id:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        name:
          type: string
        description:
          type: string
        namespace:
          type: string
        role:
          $ref: '#/components/schemas/ProjectRole'
      example:
        id: shared
        name: Shared
        description: Internal APIs
        namespace: shared
        role: deployer

    ProjectLifecycleResponse:
      type: object
      required:
        - projectId
        - name
        - namespace
        - status
      properties:
        projectId:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        name:
          type: string
        namespace:
          type: string
        status:
          type: string
          enum:
            - deleted
        deletedAt:
          type: string
          format: date-time
      example:
        projectId: shared
        name: Shared
        namespace: shared
        status: deleted
        deletedAt: '2026-04-13T12:00:00Z'

    ProjectListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSummary'
      example:
        items:
          - id: shared
            name: Shared
            description: Internal APIs
            namespace: shared
            role: deployer

    ProjectAccess:
      type: object
      properties:
        viewerGroups:
          type: array
          items:
            type: string
        deployerGroups:
          type: array
          items:
            type: string
        adminGroups:
          type: array
          items:
            type: string

    ProjectEnvironmentInput:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        name:
          type: string
        clusterId:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        writeMode:
          type: string
          enum:
            - direct
            - pull_request
        default:
          type: boolean

    ProjectRepositoryInput:
      type: object
      required:
        - id
        - name
        - url
      properties:
        id:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        name:
          type: string
        url:
          type: string
          format: uri
        description:
          type: string
        branch:
          type: string
        authSecretPath:
          type: string
        configFile:
          type: string

    CreateProjectRequest:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        name:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          description: Must match `id`. Project name is also used as the Kubernetes namespace slug.
        description:
          type: string
        namespace:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          description: Optional override field, but if provided it must match `name`.
        access:
          $ref: '#/components/schemas/ProjectAccess'
        environments:
          type: array
          items:
            $ref: '#/components/schemas/ProjectEnvironmentInput'
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/ProjectRepositoryInput'
        policies:
          $ref: '#/components/schemas/ProjectPolicy'
      example:
        id: payment
        name: payment
        description: 결제 도메인 워크로드
        access:
          viewerGroups:
            - aods:payment:view
          deployerGroups:
            - aods:payment:deploy
        environments:
          - id: prod
            name: Production
            clusterId: default
            writeMode: direct
            default: true
        repositories:
          - id: payment-api
            name: Payment API
            url: https://github.com/aolda/payment-api
            branch: main
            configFile: aolda_deploy.json

    SecretEntry:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: string

    ApplicationSecretSummary:
      type: object
      required:
        - key
      properties:
        key:
          type: string

    ApplicationSecretVersionSummary:
      type: object
      required:
        - version
        - current
      properties:
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
          description: Vault-reported creation timestamp for this version.
        updatedBy:
          type: string
          description: User recorded in Vault custom metadata, when available.
        current:
          type: boolean
        deleted:
          type: boolean
          description: Whether the Vault version is soft-deleted.
        destroyed:
          type: boolean
          description: Whether the Vault version has been permanently destroyed.
        keyCount:
          type: integer
          minimum: 0
          description: Number of environment variable keys in the version, when known.

    ApplicationSecretsResponse:
      type: object
      required:
        - applicationId
        - secretPath
        - configured
        - versioningEnabled
        - items
      properties:
        applicationId:
          type: string
        secretPath:
          type: string
          description: Vault logical path for the application environment secret.
        configured:
          type: boolean
          description: Whether GitOps desired state currently references this Vault path through ExternalSecret.
        versioningEnabled:
          type: boolean
          description: Whether Vault KV v2 version metadata is available for this secret.
        currentVersion:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time
          description: Creation timestamp of the current Vault KV v2 version, when available.
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationSecretSummary'

    ApplicationSecretVersionsResponse:
      type: object
      required:
        - applicationId
        - secretPath
        - items
      properties:
        applicationId:
          type: string
        secretPath:
          type: string
          description: Vault logical path for the application environment secret.
        currentVersion:
          type: integer
          minimum: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationSecretVersionSummary'

    UpdateSecretsRequest:
      type: object
      properties:
        set:
          type: array
          description: Keys to create or replace. Values are accepted in requests but never returned.
          items:
            $ref: '#/components/schemas/SecretEntry'
        delete:
          type: array
          description: Keys to remove from the final application environment secret.
          items:
            type: string

    CreateApplicationRequest:
      type: object
      description: 빠른 생성 모드에서는 `name`, `image`, `servicePort`, `deploymentStrategy`를 직접 넣고, GitHub 읽기 모드에서는 `repositoryUrl`, `configPath`를 넣어 `aolda_deploy.json` 기반으로 자동 채운다. 공개 저장소는 URL만으로 등록할 수 있고, private 저장소이거나 GitHub API 호출 한도를 안정적으로 확보하려면 `repositoryToken`을 함께 넣는다. private 이미지가 있으면 `registryUsername`, `registryToken`을 함께 넣어 image pull credential도 별도로 저장한다.
      oneOf:
        - required:
            - name
            - image
            - servicePort
            - deploymentStrategy
        - required:
            - repositoryUrl
      properties:
        name:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        description:
          type: string
        image:
          type: string
        servicePort:
          type: integer
          minimum: 1
          maximum: 65535
        replicas:
          type: integer
          minimum: 1
        deploymentStrategy:
          type: string
          enum:
            - Rollout
            - Canary
        meshEnabled:
          type: boolean
          description: Istio sidecar/VirtualService/DestinationRule 사용 여부. Canary면 true여야 한다.
        loadBalancerEnabled:
          type: boolean
          description: Kubernetes Service를 LoadBalancer 타입으로 노출할지 여부. Canary와 동시 사용은 허용하지 않는다.
        environment:
          type: string
        repositoryId:
          type: string
        repositoryUrl:
          type: string
          format: uri
          description: GitHub 저장소 URL. 공개 저장소는 URL만으로 연결할 수 있다.
        repositoryBranch:
          type: string
        repositoryToken:
          type: string
          description: 선택 입력. private 저장소 접근 또는 GitHub API rate limit 완화를 위한 fine-grained PAT. 저장 시 애플리케이션 환경변수 Vault 경로와 분리된 별도 경로에 저장된다.
        repositoryServiceId:
          type: string
          description: descriptor 내 서비스 식별자. 비우면 앱 이름 또는 단일 서비스 기준으로 추론한다.
        configPath:
          type: string
          description: 기본값은 `aolda_deploy.json`.
        repositoryPollIntervalSeconds:
          type: integer
          enum: [60, 300, 600]
          description: 저장소 polling 주기. 1분, 5분, 10분만 허용한다.
        registryServer:
          type: string
          description: private 컨테이너 이미지 registry 주소. 비우면 이미지 주소에서 자동 추론한다.
        registryUsername:
          type: string
          description: private registry 접근 계정명. 예: GHCR이면 GitHub username.
        registryToken:
          type: string
          description: private registry image pull 토큰. 저장 시 별도 registry credential Vault 경로에 dockerconfigjson 형식으로 저장된다.
        secrets:
          type: array
          description: Secrets are submitted directly to the backend and stored in Vault KV v2.
          items:
            $ref: '#/components/schemas/SecretEntry'
      example:
        name: payment-api
        description: 결제 API
        environment: prod
        meshEnabled: false
        loadBalancerEnabled: false
        repositoryUrl: https://github.com/aolda/payment-api
        repositoryBranch: main
        repositoryServiceId: payment-api
        configPath: aolda_deploy.json
        repositoryPollIntervalSeconds: 300
        registryServer: ghcr.io
        registryUsername: octocat
        registryToken: ghp_packages_xxx
        secrets:
          - key: DATABASE_URL
            value: postgres://db.internal/payment

    PreviewApplicationSourceRequest:
      type: object
      required:
        - repositoryUrl
      properties:
        name:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        repositoryUrl:
          type: string
          format: uri
        repositoryBranch:
          type: string
        repositoryToken:
          type: string
        repositoryServiceId:
          type: string
        configPath:
          type: string
      example:
        repositoryUrl: https://github.com/aolda/payment-api
        repositoryBranch: main
        configPath: aolda_deploy.json

    PreviewApplicationSourceService:
      type: object
      required:
        - serviceId
        - image
        - port
        - replicas
      properties:
        serviceId:
          type: string
        image:
          type: string
        port:
          type: integer
        replicas:
          type: integer
        strategy:
          type: string
          enum:
            - Rollout
            - Canary
      example:
        serviceId: payment-api
        image: ghcr.io/aolda/payment-api:sha-1a2b3c4d
        port: 8080
        replicas: 2
        strategy: Rollout

    PreviewApplicationSourceResponse:
      type: object
      required:
        - configPath
        - services
        - requiresServiceSelection
      properties:
        configPath:
          type: string
        services:
          type: array
          items:
            $ref: '#/components/schemas/PreviewApplicationSourceService'
        selectedServiceId:
          type: string
        requiresServiceSelection:
          type: boolean
      example:
        configPath: aolda_deploy.json
        services:
          - serviceId: payment-api
            image: ghcr.io/aolda/payment-api:sha-1a2b3c4d
            port: 8080
            replicas: 2
            strategy: Rollout
          - serviceId: payment-worker
            image: ghcr.io/aolda/payment-worker:sha-1a2b3c4d
            port: 9090
            replicas: 1
            strategy: Canary
        selectedServiceId: payment-api
        requiresServiceSelection: false

    VerifyImageAccessRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Full container image reference including tag or digest.
        registryServer:
          type: string
          description: Optional registry server override. If omitted, AODS infers it from the image.
        registryUsername:
          type: string
          description: Optional registry username for private images.
        registryToken:
          type: string
          description: Optional registry token/password for private images.
      example:
        image: ghcr.io/aolda/payment-api:sha-1a2b3c4d
        registryServer: ghcr.io
        registryUsername: octocat
        registryToken: ghp_packages_xxx

    VerifyImageAccessResponse:
      type: object
      required:
        - image
        - registry
        - accessible
        - message
      properties:
        image:
          type: string
        registry:
          type: string
        accessible:
          type: boolean
        message:
          type: string
      example:
        image: ghcr.io/aolda/payment-api:sha-1a2b3c4d
        registry: ghcr.io
        accessible: true
        message: 이미지를 가져올 수 있습니다.

    Application:
      type: object
      required:
        - id
        - projectId
        - name
        - image
        - servicePort
        - deploymentStrategy
      properties:
        id:
