openapi: 3.0.3
info:
  title: Internal App Deployment Platform API
  version: 0.8.0
  description: >
    Phase 1 through Phase 4 API specification for the internal app deployment
    platform. This contract covers GitHub-backed catalog discovery, standard and
    canary deployment workflows, change management, environment and policy
    controls, GitOps sync visibility, Vault-backed secret submission, and
    platform-scale guardrails.
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /api/v1/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects:
    get:
      summary: List projects available to the current user
      responses:
        '200':
          description: Project list filtered by authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/clusters:
    get:
      summary: List cluster targets available to the platform
      responses:
        '200':
          description: Cluster list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/environments:
    get:
      summary: List environments configured for a project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project environment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/repositories:
    get:
      summary: List source repositories connected to a project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project repository list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/policies:
    get:
      summary: Read project deployment guardrails
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update project deployment guardrails
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPolicy'
      responses:
        '200':
          description: Updated project policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/changes:
    post:
      summary: Create a reviewed change request for a project mutation
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChangeRequest'
      responses:
        '201':
          description: Change created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/projects/{projectId}/applications:
    get:
      summary: List applications in a project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project application list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a new application
      description: Phase 1 supports Standard deployment only.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments:
    get:
      summary: List deployment history for an application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Deployment history list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Trigger a new deployment revision
      description: Supports standard redeploys and canary revisions.
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}:
    patch:
      summary: Update application strategy or environment defaults
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
      responses:
        '200':
          description: Application updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments/{deploymentId}:
    get:
      summary: Get deployment revision detail including rollout state
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Deployment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments/{deploymentId}/promote:
    post:
      summary: Promote a canary rollout to the next step
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Deployment promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/deployments/{deploymentId}/abort:
    post:
      summary: Abort an in-flight canary rollout
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Deployment aborted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/sync-status:
    get:
      summary: Check Flux GitOps sync status via Kubernetes API
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/metrics:
    get:
      summary: Get core Prometheus metrics for the application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Metric snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/rollback-policies:
    get:
      summary: Get rollback policy thresholds for an application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Current rollback policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Save rollback policy thresholds for an application
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackPolicy'
      responses:
        '200':
          description: Rollback policy saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/applications/{applicationId}/events:
    get:
      summary: List application deployment and policy events
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}:
    get:
      summary: Get change request detail
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}/submit:
    post:
      summary: Submit a draft change for review
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}/approve:
    post:
      summary: Approve a submitted change
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes/{changeId}/merge:
    post:
      summary: Merge an approved change into the desired state
      parameters:
        - $ref: '#/components/parameters/ChangeId'
      responses:
        '200':
          description: Change merged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: Project identifier from the GitHub-backed project catalog.
      schema:
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
    ApplicationId:
      name: applicationId
      in: path
      required: true
      description: Deterministic application ID derived from GitHub path, e.g. project-a__my-app.
      schema:
        type: string
    DeploymentId:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
    ChangeId:
      name: changeId
      in: path
      required: true
      schema:
        type: string

  schemas:
    CurrentUser:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        groups:
          type: array
          items:
            type: string

    ProjectRole:
      type: string
      enum:
        - viewer
        - deployer
        - admin

    ProjectSummary:
      type: object
      required:
        - id
        - name
        - namespace
        - role
      properties:
        id:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        name:
          type: string
        description:
          type: string
        namespace:
          type: string
        role:
          $ref: '#/components/schemas/ProjectRole'

    ProjectListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSummary'

    SecretEntry:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: string

    CreateApplicationRequest:
      type: object
      required:
        - name
        - image
        - servicePort
        - deploymentStrategy
      properties:
        name:
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        description:
          type: string
        image:
          type: string
        servicePort:
          type: integer
          minimum: 1
          maximum: 65535
        replicas:
          type: integer
          minimum: 1
        deploymentStrategy:
          type: string
          enum:
            - Standard
            - Canary
        environment:
          type: string
        repositoryId:
          type: string
        repositoryServiceId:
          type: string
        configPath:
          type: string
        secrets:
          type: array
          description: Secrets are submitted directly to the backend and stored in Vault KV v2.
          items:
            $ref: '#/components/schemas/SecretEntry'

    Application:
      type: object
      required:
        - id
        - projectId
        - name
        - image
        - servicePort
        - deploymentStrategy
      properties:
        id:
          type: string
          description: Deterministic ID derived from GitHub path, e.g. project-a__my-app.
        projectId:
          type: string
        name:
          type: string
        description:
          type: string
        image:
          type: string
        servicePort:
          type: integer
        replicas:
          type: integer
        deploymentStrategy:
          type: string
          enum:
            - Standard
            - Canary
        defaultEnvironment:
          type: string
        syncStatus:
          $ref: '#/components/schemas/SyncStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        repositoryId:
          type: string
        repositoryServiceId:
          type: string
        configPath:
          type: string

    ApplicationSummary:
      type: object
      required:
        - id
        - name
        - image
        - deploymentStrategy
        - syncStatus
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        deploymentStrategy:
          type: string
          enum:
            - Standard
            - Canary
        syncStatus:
          $ref: '#/components/schemas/SyncStatus'

    ApplicationListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationSummary'

    CreateDeploymentRequest:
      type: object
      required:
        - imageTag
      properties:
        imageTag:
          type: string
        environment:
          type: string

    UpdateApplicationRequest:
      type: object
      properties:
        description:
          type: string
        image:
          type: string
        servicePort:
          type: integer
          minimum: 1
          maximum: 65535
        replicas:
          type: integer
          minimum: 1
        deploymentStrategy:
          type: string
          enum:
            - Standard
            - Canary
        environment:
          type: string
        repositoryId:
          type: string
        repositoryServiceId:
          type: string
        configPath:
          type: string

    DeploymentResponse:
      type: object
      required:
        - deploymentId
        - applicationId
        - imageTag
        - status
      properties:
        deploymentId:
          type: string
        applicationId:
          type: string
        imageTag:
          type: string
        environment:
          type: string
        status:
          type: string
          enum:
            - Pending
            - Syncing
            - Promoted
            - Aborted

    DeploymentRecord:
      type: object
      required:
        - deploymentId
        - applicationId
        - projectId
        - applicationName
        - environment
        - image
        - imageTag
        - deploymentStrategy
        - status
        - createdAt
        - updatedAt
      properties:
        deploymentId:
          type: string
        applicationId:
          type: string
        projectId:
          type: string
        applicationName:
          type: string
        environment:
          type: string
        image:
          type: string
        imageTag:
          type: string
        deploymentStrategy:
          type: string
          enum:
            - Standard
            - Canary
        status:
          type: string
        syncStatus:
          $ref: '#/components/schemas/SyncStatus'
        rolloutPhase:
          type: string
        currentStep:
          type: integer
        canaryWeight:
          type: integer
        stableRevision:
          type: string
        canaryRevision:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DeploymentListResponse:
      type: object
      required:
        - applicationId
        - items
      properties:
        applicationId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentRecord'

    SyncStatus:
      type: string
      enum:
        - Unknown
        - Syncing
        - Synced
        - Degraded

    SyncStatusResponse:
      type: object
      required:
        - applicationId
        - status
      properties:
        applicationId:
          type: string
        status:
          $ref: '#/components/schemas/SyncStatus'
        message:
          type: string
        observedAt:
          type: string
          format: date-time

    MetricPoint:
      type: object
      required:
        - timestamp
        - value
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          nullable: true

    MetricSeries:
      type: object
      required:
        - key
        - label
        - unit
        - points
      properties:
        key:
          type: string
        label:
          type: string
        unit:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/MetricPoint'

    ApplicationMetricsResponse:
      type: object
      required:
        - applicationId
        - metrics
      properties:
        applicationId:
          type: string
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricSeries'

    EnvironmentSummary:
      type: object
      required:
        - id
        - name
        - clusterId
        - writeMode
        - default
      properties:
        id:
          type: string
        name:
          type: string
        clusterId:
          type: string
        writeMode:
          type: string
          enum:
            - direct
            - pull_request
        default:
          type: boolean

    EnvironmentListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentSummary'
    RepositorySummary:
      type: object
      required:
        - id
        - name
        - url
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        description:
          type: string
        configFile:
          type: string
    RepositoryListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RepositorySummary'

    ProjectPolicy:
      type: object
      required:
        - minReplicas
        - allowedEnvironments
        - allowedDeploymentStrategies
        - allowedClusterTargets
        - prodPRRequired
        - autoRollbackEnabled
        - requiredProbes
      properties:
        minReplicas:
          type: integer
        allowedEnvironments:
          type: array
          items:
            type: string
        allowedDeploymentStrategies:
          type: array
          items:
            type: string
            enum:
              - Standard
              - Canary
        allowedClusterTargets:
          type: array
          items:
            type: string
        prodPRRequired:
          type: boolean
        autoRollbackEnabled:
          type: boolean
        requiredProbes:
          type: boolean

    ClusterSummary:
      type: object
      required:
        - id
        - name
        - default
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        default:
          type: boolean

    ClusterListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClusterSummary'

    RollbackPolicy:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        maxErrorRate:
          type: number
        maxLatencyP95Ms:
          type: integer
        minRequestRate:
          type: number

    ApplicationEvent:
      type: object
      required:
        - id
        - type
        - message
        - createdAt
      properties:
        id:
          type: string
        type:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    EventListResponse:
      type: object
      required:
        - applicationId
        - items
      properties:
        applicationId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationEvent'

    CreateChangeRequest:
      type: object
      required:
        - operation
      properties:
        operation:
          type: string
          enum:
            - CreateApplication
            - UpdateApplication
            - Redeploy
            - UpdatePolicies
        applicationId:
          type: string
        name:
          type: string
        description:
          type: string
        image:
          type: string
        servicePort:
          type: integer
        deploymentStrategy:
          type: string
          enum:
            - Standard
            - Canary
        environment:
          type: string
        imageTag:
          type: string
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretEntry'
        policies:
          $ref: '#/components/schemas/ProjectPolicy'
        summary:
          type: string

    ChangeRecord:
      type: object
      required:
        - id
        - projectId
        - operation
        - environment
        - writeMode
        - status
        - summary
        - diffPreview
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        projectId:
          type: string
        applicationId:
          type: string
        operation:
          type: string
          enum:
            - CreateApplication
            - UpdateApplication
            - Redeploy
            - UpdatePolicies
        environment:
          type: string
        writeMode:
          type: string
          enum:
            - direct
            - pull_request
        status:
          type: string
          enum:
            - Draft
            - Submitted
            - Approved
            - Merged
        summary:
          type: string
        diffPreview:
          type: array
          items:
            type: string
        createdBy:
          type: string
        approvedBy:
          type: string
        mergedBy:
          type: string
        request:
          $ref: '#/components/schemas/CreateChangeRequest'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorBody:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        requestId:
          type: string
        retryable:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

  responses:
    BadRequest:
      description: Invalid request payload or unsupported input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated, but not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Referenced project, application, deployment, or backing resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource state conflict, duplicate application, or operation already in progress
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server or integration failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# Phase 2-4 endpoints are now part of the active contract above.
