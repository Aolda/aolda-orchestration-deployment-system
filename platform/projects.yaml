projects:
  - id: shared
    name: shared
    description: 공용 내부 서비스와 운영 검증 워크로드를 관리합니다.
    namespace: shared
    access:
      viewerGroups:
        - aods:shared:view
        - /Ajou_Univ/Aolda_Member/aods/ops
      deployerGroups:
        - aods:shared:deploy
        - /Ajou_Univ/Aolda_Member/aods/ops
      adminGroups:
        - /Ajou_Univ/Aolda_Admin
        - aods:platform:admin
    environments:
      - id: shared
        name: Shared
        clusterId: default
        writeMode: direct
        default: true
    policies:
      minReplicas: 2
      allowedEnvironments:
        - shared
      allowedDeploymentStrategies:
        - Rollout
        - Canary
      allowedClusterTargets:
        - default
      prodPRRequired: false
      autoRollbackEnabled: true
      requiredProbes: true
