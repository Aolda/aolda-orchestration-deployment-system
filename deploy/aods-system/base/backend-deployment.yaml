apiVersion: apps/v1
kind: Deployment
metadata:
  name: aods-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aods-backend
  template:
    metadata:
      labels:
        app: aods-backend
    spec:
      serviceAccountName: aods-backend
      imagePullSecrets:
        - name: aods-registry-creds
      containers:
        - name: backend
          image: ghcr.io/aolda/aods-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AODS_ADDR
              value: ":8080"
            - name: AODS_REPO_ROOT
              value: /app
            - name: AODS_AUTH_MODE
              value: oidc
            - name: AODS_PLATFORM_ADMIN_AUTHORITIES
              value: aods:platform:admin
            - name: AODS_ALLOW_DEV_FALLBACK
              value: "true"
            - name: AODS_ALLOWED_ORIGIN
              value: https://aods.ajou.app,https://aods.jalju.com
            - name: AODS_OIDC_ISSUER_URL
              value: https://sso.aoldacloud.com/realms/aolda
            - name: AODS_OIDC_AUDIENCE
              value: ""
            - name: AODS_OIDC_USER_ID_CLAIM
              value: sub
            - name: AODS_OIDC_USERNAME_CLAIM
              value: preferred_username
            - name: AODS_OIDC_DISPLAY_NAME_CLAIM
              value: name
            - name: AODS_OIDC_GROUPS_CLAIM
              value: groups
            - name: AODS_OIDC_REQUEST_TIMEOUT
              value: 5s
            - name: AODS_DEV_GROUPS
              value: aods:shared:deploy,aods:platform:admin
            - name: AODS_DEV_DISPLAY_NAME
              value: 테스트베드 운영자
            - name: AODS_GIT_MODE
              value: git
            - name: AODS_GIT_REPO_DIR
              value: /data/gitops
            - name: AODS_GIT_BRANCH
              value: main
            - name: AODS_GIT_AUTHOR_NAME
              value: AODS Bot
            - name: AODS_GIT_AUTHOR_EMAIL
              value: aods-bot@local
            - name: AODS_GIT_SYNC_TTL
              value: 10s
            - name: GIT_CONFIG_COUNT
              value: "2"
            - name: GIT_CONFIG_KEY_0
              value: gc.auto
            - name: GIT_CONFIG_VALUE_0
              value: "0"
            - name: GIT_CONFIG_KEY_1
              value: maintenance.auto
            - name: GIT_CONFIG_VALUE_1
              value: "0"
            - name: AODS_GIT_REMOTE
              valueFrom:
                secretKeyRef:
                  name: aods-backend-secrets
                  key: AODS_GIT_REMOTE
            - name: AODS_K8S_MODE
              value: token
            - name: AODS_K8S_API_URL
              value: https://kubernetes.default.svc
            - name: AODS_K8S_REQUEST_TIMEOUT
              value: 5s
            - name: AODS_FLUX_KUSTOMIZATION_NAMESPACE
              value: flux-system
            - name: AODS_FLUX_SOURCE_NAME
              value: aods-manifest
            - name: AODS_PROMETHEUS_MODE
              value: prometheus
            - name: AODS_PROMETHEUS_URL
              value: http://kube-prometheus-stack-prometheus.monitoring:9090
            - name: AODS_PROMETHEUS_REQUEST_TIMEOUT
              value: 5s
            - name: AODS_PROMETHEUS_RANGE
              value: 1h
            - name: AODS_PROMETHEUS_STEP
              value: 5m
            - name: AODS_VAULT_MODE
              value: token
            - name: AODS_VAULT_ADDR
              value: http://vault-active.shared.svc.cluster.local:8200
            - name: AODS_VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aods-backend-secrets
                  key: AODS_VAULT_TOKEN
            - name: AODS_VAULT_NAMESPACE
              value: ""
            - name: AODS_VAULT_REQUEST_TIMEOUT
              value: 5s
            - name: AODS_IMAGE_CHECK_MODE
              value: anonymous
            - name: AODS_IMAGE_CHECK_TIMEOUT
              value: 5s
            - name: AODS_MARIADB_DSN
              valueFrom:
                secretKeyRef:
                  name: aods-backend-secrets
                  key: AODS_MARIADB_DSN
                  optional: true
            - name: AODS_DEPLOYMENT_OPERATION_INTERVAL
              value: 2s
            - name: AODS_DEPLOYMENT_OPERATION_LEASE
              value: 5m
            - name: AODS_DEPLOYMENT_OPERATION_MAX_ATTEMPTS
              value: "5"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
