apiVersion: apps/v1
kind: Deployment
metadata:
  name: aods-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aods-frontend
  template:
    metadata:
      labels:
        app: aods-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      imagePullSecrets:
        - name: aods-registry-creds
      containers:
        - name: frontend
          image: ghcr.io/aolda/aods-frontend:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-runtime
              mountPath: /tmp/nginx
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: nginx-runtime
          emptyDir: {}
